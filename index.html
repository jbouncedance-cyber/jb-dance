<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#D4006A">
<title>JB DANCE 입시반</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#D4006A;--pink2:#ff4da6;--pink-bg:#fff0f7;
  --black:#111;--gray:#777;--gray2:#bbb;--light:#f5f5f7;--white:#fff;
  --border:#e8e8e8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --red:#ef4444;--red-bg:#fef2f2;--red-bd:#fecaca;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --amber:#b45309;--amber-bg:#fffbeb;--amber-bd:#fde68a;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-bd:#ddd6fe;
  --teal:#0d9488;--teal-bg:#f0fdfa;--teal-bd:#99f6e4;
}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:var(--light);color:var(--black);min-height:100vh;overflow-x:hidden;font-size:15px}
.page{display:none;min-height:100vh;flex-direction:column}
.page.active{display:flex}
.header{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:900;color:var(--pink);letter-spacing:-1px}
.header-sub{font-size:11px;color:var(--gray);margin-top:1px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 10px 4px 0;color:var(--black);line-height:1}
.header-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.sbtn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px;color:var(--gray);font-family:inherit;white-space:nowrap}
.sbtn:active{background:var(--light)}
.sbtn.pink{background:var(--pink);border-color:var(--pink);color:var(--white);font-weight:700}
.sbtn.danger{border-color:var(--red-bd);color:var(--red)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;background:none;border:none;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;color:var(--gray2);font-family:inherit}
.nav-btn.active{color:var(--pink)}
.nav-icon{font-size:20px;line-height:1.2}
.content{flex:1;padding:12px 12px 90px}
.card{background:var(--white);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.card-head{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px}
.card-title{font-size:14px;font-weight:700}
.card-body{padding:13px 14px}
/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge.pink{background:var(--pink-bg);color:var(--pink)}
.badge.blue{background:var(--blue-bg);color:var(--blue)}
.badge.green{background:var(--green-bg);color:var(--green)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.gray{background:var(--light);color:var(--gray);border:1px solid var(--border)}
.badge.purple{background:var(--purple-bg);color:var(--purple)}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.teal{background:var(--teal-bg);color:var(--teal)}
/* class chips on main list */
.chip-reg{display:inline-block;background:var(--pink-bg);border:1px solid #fbb6d8;border-radius:7px;padding:3px 9px;font-size:12px;margin:2px}
.chip-train{display:inline-block;background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:7px;padding:3px 9px;font-size:12px;margin:2px}
.chip-pickup{display:inline-block;background:var(--teal-bg);border:1px solid var(--teal-bd);border-radius:7px;padding:3px 9px;font-size:12px;margin:2px}
/* forms */
input[type=text],input[type=password],input[type=number],input[type=date],input[type=time],textarea,select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:var(--white);color:var(--black);outline:none;transition:border .15s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--pink)}
textarea{resize:vertical;min-height:80px}
.form-row{margin-bottom:11px}
.form-label{font-size:12px;font-weight:700;color:var(--gray);margin-bottom:4px;display:block}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-pink{background:var(--pink);color:var(--white)}
.btn-pink:active{background:var(--pink2)}
.btn-outline{background:var(--white);color:var(--pink);border:1.5px solid var(--pink)}
.btn-gray{background:var(--light);color:var(--black);border:1px solid var(--border)}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column}
.modal-head{padding:15px 17px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:16px;font-weight:800}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);line-height:1;font-family:inherit}
.modal-body{overflow-y:auto;flex:1;padding:13px 17px}
.modal-foot{padding:13px 17px;border-top:1px solid var(--border);flex-shrink:0}
/* class option */
.cls-opt{padding:11px 13px;border-radius:10px;border:1.5px solid var(--border);margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--white)}
.cls-opt:active,.cls-opt.selected{border-color:var(--pink);background:var(--pink-bg)}
.chk{width:21px;height:21px;border-radius:50%;border:2px solid var(--gray2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.cls-opt.selected .chk{background:var(--pink);border-color:var(--pink);color:var(--white)}
/* lock */
.lock-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;background:linear-gradient(160deg,#fff0f7,#f5f5f7)}
.lock-logo{font-size:26px;font-weight:900;color:var(--pink);letter-spacing:-1px;margin-bottom:3px}
.lock-sub{font-size:12px;color:var(--gray);margin-bottom:24px}
.lock-avatar{width:76px;height:76px;border-radius:50%;background:var(--pink-bg);border:3px solid var(--pink);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;font-weight:700;color:var(--pink)}
.lock-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.lock-box{background:var(--white);border-radius:20px;border:1px solid var(--border);padding:20px;width:100%;max-width:320px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.pin-dots{display:flex;gap:16px;justify-content:center;margin:12px 0}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--gray2);transition:all .15s}
.pin-dot.filled{background:var(--pink);border-color:var(--pink)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:4px}
.pin-key{background:var(--light);border:1px solid var(--border);border-radius:11px;padding:14px;font-size:20px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit}
.pin-key:active{background:var(--pink-bg);border-color:var(--pink);color:var(--pink)}
.error-msg{color:var(--red);font-size:12px;text-align:center;min-height:17px;margin-top:3px}
/* admin */
.tab-bar{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--white)}
.tab-btn{padding:10px 15px;border:none;background:none;font-size:13px;font-weight:700;color:var(--gray);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;flex-shrink:0}
.tab-btn.active{color:var(--pink);border-bottom-color:var(--pink)}
.adm-section{background:var(--white);border-radius:13px;border:1px solid var(--border);margin-bottom:11px;overflow:hidden}
.adm-row{padding:11px 13px;display:flex;align-items:center;border-bottom:1px solid var(--border);gap:9px}
.adm-row:last-child{border-bottom:none}
.del-btn{background:none;border:1px solid var(--red-bd);color:var(--red);border-radius:8px;padding:4px 9px;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
.edt-btn{background:none;border:1px solid var(--border);color:var(--gray);border-radius:8px;padding:4px 9px;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
.add-row{padding:9px 13px;display:flex;gap:6px;border-top:1px solid var(--border);flex-wrap:wrap}
.add-row input,.add-row select{flex:1;min-width:70px;padding:8px 11px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;background:var(--white);outline:none}
.add-row input:focus,.add-row select:focus{border-color:var(--pink)}
.add-row button{background:var(--pink);color:var(--white);border:none;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.cnt-badge{background:var(--blue-bg);color:var(--blue);padding:2px 8px;border-radius:11px;font-size:11px;font-weight:700;flex-shrink:0}
.unread-cnt{background:var(--red);color:var(--white);border-radius:20px;padding:1px 7px;font-size:11px;font-weight:800;margin-left:4px}
.notice-bar{background:linear-gradient(135deg,#fff0f7,#fce7f3);border:1px solid #fbb6d8;border-radius:12px;padding:11px 13px;margin-bottom:10px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}
.alert-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;margin-left:4px;vertical-align:middle}
.hint-box{background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:9px;padding:9px 11px;margin-bottom:9px;font-size:12px;color:var(--amber);line-height:1.5}
.empty-msg{text-align:center;padding:26px;color:var(--gray);font-size:14px}
/* avatar */
.avatar{width:44px;height:44px;border-radius:50%;background:var(--pink-bg);border:2px solid var(--pink2);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0;font-weight:700;color:var(--pink)}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-avatar-wrap{width:86px;height:86px;border-radius:50%;background:var(--pink-bg);border:3px solid var(--pink);margin:0 auto 11px;display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden;position:relative;cursor:pointer;font-weight:700;color:var(--pink)}
.profile-avatar-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-edit{position:absolute;bottom:0;right:0;background:var(--pink);color:var(--white);border-radius:50%;width:23px;height:23px;display:flex;align-items:center;justify-content:center;font-size:12px}
/* timetable */
.tt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tt-table{border-collapse:collapse;min-width:560px;width:100%;font-size:12px}
.tt-table th{background:var(--light);padding:7px 5px;text-align:center;border:1px solid var(--border);font-weight:700;white-space:nowrap;font-size:11px}
.tt-table th.sun{color:var(--red)}.tt-table th.sat{color:var(--blue)}
.tt-table td{border:1px solid var(--border);vertical-align:top;min-width:72px;height:52px;padding:3px}
.tt-table td.time-col{background:var(--light);text-align:center;font-size:10px;font-weight:700;color:var(--gray);white-space:nowrap;min-width:52px;vertical-align:middle}
.tt-cell{border-radius:6px;padding:4px 5px;margin:1px;font-size:11px;line-height:1.3;cursor:default}
.tt-cell.reg{background:var(--pink-bg);border-left:3px solid var(--pink)}
.tt-cell.train{background:var(--blue-bg);border-left:3px solid var(--blue)}
.tt-cell.pickup{background:var(--teal-bg);border-left:3px solid var(--teal)}
.tt-cell .cc-name{font-weight:700}
.tt-cell .cc-teacher{color:var(--gray);font-size:10px}
/* inbody */
.ib-table{width:100%;border-collapse:collapse;font-size:12px}
.ib-table th{padding:7px 7px;background:var(--light);font-weight:700;color:var(--gray);border-bottom:2px solid var(--border);text-align:left;white-space:nowrap}
.ib-table td{padding:8px 7px;border-bottom:1px solid var(--border);vertical-align:middle}
.ib-table tr:last-child td{border-bottom:none}
/* profile class grid */
.cls-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.cls-item{background:var(--light);border-radius:9px;padding:9px 11px;border:1.5px solid var(--border);cursor:pointer;min-height:60px}
.cls-item:active,.cls-item.selected{background:var(--pink-bg);border-color:var(--pink)}
.cls-lbl{font-size:10px;color:var(--gray);margin-bottom:3px;font-weight:700}
.cls-val{font-size:13px;font-weight:700;color:var(--black);line-height:1.3}
.cls-val.empty{color:var(--gray2);font-weight:400;font-size:12px}
.cls-teacher{font-size:11px;color:var(--pink);margin-top:2px}
/* pickup history */
.pickup-hist-item{padding:8px 11px;border-radius:9px;background:var(--teal-bg);border:1px solid var(--teal-bd);margin-bottom:5px;font-size:13px}
/* notice */
.notice-content{font-size:15px;line-height:1.8;color:var(--black);white-space:pre-wrap}
.postit-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:2px 0 4px}
.postit{min-height:110px;border-radius:3px;padding:11px 10px 9px;position:relative;box-shadow:2px 3px 8px rgba(0,0,0,.13),0 1px 2px rgba(0,0,0,.08);display:flex;flex-direction:column;cursor:pointer;transition:transform .15s}
.postit:active{transform:scale(0.97)}
.postit::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:rgba(0,0,0,.08);border-radius:3px 3px 0 0}
.postit-author{font-size:11px;font-weight:800;margin-bottom:6px;opacity:.8}
.postit-content{font-size:12px;line-height:1.5;flex:1;word-break:break-all}
.postit-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.postit-time{font-size:10px;opacity:.6}
.postit-reply-cnt{font-size:10px;font-weight:700;opacity:.75}
.postit-colors{background:#fef08a}
.postit-colors:nth-child(2n){background:#bbf7d0}
.postit-colors:nth-child(3n){background:#bfdbfe}
.postit-colors:nth-child(4n){background:#fecdd3}
.postit-colors:nth-child(5n){background:#e9d5ff}
.postit-colors:nth-child(6n){background:#fed7aa}
.reply-item{padding:8px 12px;background:var(--light);border-radius:8px;margin-bottom:5px;display:flex;gap:8px;align-items:flex-start}
.reply-author{font-size:12px;font-weight:800;flex-shrink:0}
.reply-content{font-size:12px;color:var(--black);line-height:1.5;flex:1}
.reply-time{font-size:10px;color:var(--gray2);flex-shrink:0}
.img-upload-btn{display:block;width:100%;padding:10px;border:1.5px dashed var(--gray2);border-radius:9px;text-align:center;font-size:13px;color:var(--gray);cursor:pointer;background:var(--light);font-family:inherit;margin-bottom:3px}
.img-preview{width:100%;border-radius:9px;border:1px solid var(--border);margin-top:5px;display:none}
/* section title */
.sec-title{font-size:11px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 7px}
/* req item */
.req-item{background:var(--white);border-radius:11px;border:1px solid var(--border);padding:11px 13px;margin-bottom:7px}
.req-tag{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:5px}
.req-tag.change{background:var(--blue-bg);color:var(--blue)}
.req-tag.question{background:var(--purple-bg);color:var(--purple)}
/* util */
.fw7{font-weight:700}.fw8{font-weight:800}.text-sm{font-size:12px}.text-gray{color:var(--gray)}.text-pink{color:var(--pink)}.mt6{margin-top:6px}.mt10{margin-top:10px}
.divider{height:1px;background:var(--border);margin:12px 0}
</style>
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import {
    getFirestore, doc, collection,
    getDoc, getDocs, setDoc, deleteDoc, updateDoc,
    onSnapshot, writeBatch
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD90xFKykO14-bnVo0eze70R-iBxnDhzZM",
    authDomain: "jbdance-1fd1a.firebaseapp.com",
    projectId: "jbdance-1fd1a",
    storageBucket: "jbdance-1fd1a.firebasestorage.app",
    messagingSenderId: "354474021810",
    appId: "1:354474021810:web:8acdf7fa00560665414aab"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 컬렉션 참조
  const CONFIG_REF = doc(db, 'jbdance', 'config');
  const STUDENTS_COL = collection(db, 'jbdance_students');
  const MESSAGES_COL = collection(db, 'jbdance_messages');
  const REQUESTS_COL = collection(db, 'jbdance_requests');

  // ── 저장 함수들 ──
  async function saveConfig() {
    try {
      await setDoc(CONFIG_REF, {
        adminPw: window.DB.adminPw || '1234',
        notice: window.DB.notice || '',
        notices: window.DB.notices || [],
        events: window.DB.events || [],
        regularClasses: window.DB.regularClasses || [],
        trainingSlots: window.DB.trainingSlots || [],
        updatedAt: Date.now()
      });
    } catch(e) { console.warn('config 저장 실패:', e); }
  }

  async function saveStudent(student) {
    try {
      await setDoc(doc(STUDENTS_COL, String(student.id)), student);
    } catch(e) { console.warn('student 저장 실패:', e); }
  }

  async function deleteStudent(id) {
    try {
      await deleteDoc(doc(STUDENTS_COL, String(id)));
    } catch(e) { console.warn('student 삭제 실패:', e); }
  }

  async function saveMessage(message) {
    try {
      await setDoc(doc(MESSAGES_COL, String(message.id)), message);
    } catch(e) { console.warn('message 저장 실패:', e); }
  }

  async function deleteMessage(id) {
    try {
      await deleteDoc(doc(MESSAGES_COL, String(id)));
    } catch(e) { console.warn('message 삭제 실패:', e); }
  }

  async function saveRequest(request) {
    try {
      await setDoc(doc(REQUESTS_COL, String(request.id)), request);
    } catch(e) { console.warn('request 저장 실패:', e); }
  }

  async function deleteRequest(id) {
    try {
      await deleteDoc(doc(REQUESTS_COL, String(id)));
    } catch(e) { console.warn('request 삭제 실패:', e); }
  }

  // ── 마이그레이션: 기존 maindb → 새 구조로 이전 ──
  const OLD_REF = doc(db, 'jbdance', 'maindb');
  async function migrateIfNeeded() {
    // 이미 마이그레이션 됐으면 스킵
    const migrated = localStorage.getItem('jbd_migrated_v2');
    if (migrated) return false;

    try {
      const oldSnap = await getDoc(OLD_REF);
      if (!oldSnap.exists()) { localStorage.setItem('jbd_migrated_v2','1'); return false; }
      const raw = oldSnap.data();
      if (!raw || !raw.data) { localStorage.setItem('jbd_migrated_v2','1'); return false; }

      const oldDB = JSON.parse(raw.data);
      console.log('🔄 기존 데이터 마이그레이션 시작...');

      // config 저장
      await setDoc(CONFIG_REF, {
        adminPw: oldDB.adminPw || '1234',
        notice: oldDB.notice || '',
        notices: oldDB.notices || [],
        events: oldDB.events || [],
        updatedAt: Date.now()
      });

      // 학생 개별 저장
      for (const s of (oldDB.students || [])) {
        await setDoc(doc(STUDENTS_COL, String(s.id)), s);
      }

      // 메시지 개별 저장
      for (const m of (oldDB.messages || [])) {
        await setDoc(doc(MESSAGES_COL, String(m.id)), m);
      }

      // 신청 개별 저장
      for (const r of (oldDB.requests || [])) {
        await setDoc(doc(REQUESTS_COL, String(r.id)), r);
      }

      localStorage.setItem('jbd_migrated_v2','1');
      console.log('✅ 마이그레이션 완료!');
      return true;
    } catch(e) {
      console.warn('마이그레이션 실패:', e);
      return false;
    }
  }

  // ── 전체 로드 ──
  async function loadAll() {
    try {
      // 마이그레이션 먼저 체크
      await migrateIfNeeded();

      // config 로드
      const configSnap = await getDoc(CONFIG_REF);
      if (configSnap.exists()) {
        const c = configSnap.data();
        window.DB.adminPw = c.adminPw || window.DB.adminPw;
        window.DB.notice = c.notice || '';
        window.DB.notices = c.notices || [];
        window.DB.events = c.events || [];
        // 수업 목록이 저장되어 있으면 불러오기
        if (c.regularClasses && c.regularClasses.length > 0) window.DB.regularClasses = c.regularClasses;
        if (c.trainingSlots && c.trainingSlots.length > 0) window.DB.trainingSlots = c.trainingSlots;
      } else {
        await saveConfig();
      }

      // 학생 로드
      const studentsSnap = await getDocs(STUDENTS_COL);
      if (!studentsSnap.empty) {
        window.DB.students = [];
        studentsSnap.forEach(d => window.DB.students.push(d.data()));
        window.DB.students.sort((a,b) => a.name.localeCompare(b.name, 'ko'));
      } else {
        // 최초: 코드 기본값 저장
        for (const s of window.DB.students) await saveStudent(s);
      }

      // 메시지 로드
      const msgsSnap = await getDocs(MESSAGES_COL);
      window.DB.messages = [];
      msgsSnap.forEach(d => window.DB.messages.push(d.data()));
      window.DB.messages.sort((a,b) => a.id.localeCompare(b.id));

      // 신청 로드
      const reqsSnap = await getDocs(REQUESTS_COL);
      window.DB.requests = [];
      reqsSnap.forEach(d => window.DB.requests.push(d.data()));

      DB = window.DB;
      console.log('✅ Firebase 전체 로드 완료');
    } catch(e) {
      console.warn('Firebase 로드 실패:', e);
    }
    if (window.renderMain) window.renderMain();
    // 로딩 오버레이 제거
    const ov = document.getElementById('loading-overlay');
    if (ov) { ov.style.opacity='0'; ov.style.transition='opacity .3s'; setTimeout(()=>ov.remove(), 300); }
  }

  // ── 실시간 동기화 (개별 컬렉션) ──
  function startSync() {
    // config 변경 감지
    onSnapshot(CONFIG_REF, (snap) => {
      if (!snap.exists()) return;
      const c = snap.data();
      window.DB.adminPw = c.adminPw || window.DB.adminPw;
      window.DB.notice = c.notice || '';
      window.DB.notices = c.notices || [];
      window.DB.events = c.events || [];
      if (c.regularClasses && c.regularClasses.length > 0) window.DB.regularClasses = c.regularClasses;
      if (c.trainingSlots && c.trainingSlots.length > 0) window.DB.trainingSlots = c.trainingSlots;
      DB = window.DB;
      if (window.renderMain) window.renderMain();
    });

    // 학생 컬렉션 변경 감지
    onSnapshot(STUDENTS_COL, (snap) => {
      window.DB.students = [];
      snap.forEach(d => window.DB.students.push(d.data()));
      window.DB.students.sort((a,b) => a.name.localeCompare(b.name, 'ko'));
      DB = window.DB;
      // 프로필 페이지 열려있으면 메인만 업데이트 (입력 중 방해 안 함)
      const profileActive = document.getElementById('page-profile')?.classList.contains('active');
      if (!profileActive && window.renderMain) window.renderMain();
      else if (profileActive) {
        // 명단만 백그라운드 업데이트 (화면은 그대로)
        console.log('🔄 학생 동기화 (프로필 페이지 열림 - 화면 유지)');
      }
    });

    // 메시지 변경 감지
    onSnapshot(MESSAGES_COL, (snap) => {
      window.DB.messages = [];
      snap.forEach(d => window.DB.messages.push(d.data()));
      window.DB.messages.sort((a,b) => a.id.localeCompare(b.id));
      DB = window.DB;
      if (window.renderMain) window.renderMain();
    });

    // 신청 변경 감지
    onSnapshot(REQUESTS_COL, (snap) => {
      window.DB.requests = [];
      snap.forEach(d => window.DB.requests.push(d.data()));
      DB = window.DB;
      if (window.renderMain) window.renderMain();
    });
  }

  // ── 전역 노출 ──
  window.fb = {
    saveConfig,
    saveStudent,
    deleteStudent,
    saveMessage,
    deleteMessage,
    saveRequest,
    deleteRequest,
  };

  // 앱 시작
  window.addEventListener('load', async () => {
    await new Promise(r => setTimeout(r, 300));
    await loadAll();
    startSync();
  });
</script>

    const s=window.DB.students.find(x=>x.id===studentId);
    if(s && window.fbSaveStudent) window.fbSaveStudent(s);
  } else if(type==='message'){
    if(window.fbSaveMessages) window.fbSaveMessages();
  } else {
    // config (공지, 행사, 관리자PW 등)
    if(window.fbSaveConfig) window.fbSaveConfig();
  }
}

          return `<div class="postit" style="background:${col};transform:rotate(${(i%3-1)*1.5}deg)" onclick="openMsgDetail('${m.id}')">

        }).join('')}
      </div>`

function submitMsg(){
  const role=document.getElementById('msg-role').value;
  const pw=document.getElementById('msg-pw').value;
  const content=document.getElementById('msg-content').value.trim();
  const errEl=document.getElementById('msg-err');
  if(!content){errEl.textContent='내용을 입력해주세요';return}
  let authorName='';let isTeacher=false;
  if(role==='teacher'){
    const tname=(document.getElementById('msg-teacher-name').value||'').trim();
    if(!tname){errEl.textContent='선생님 이름을 입력해주세요';return}
    if(!pw){errEl.textContent='비밀번호를 입력해주세요';return}
    if(pw!==DB.adminPw){errEl.textContent='관리자 비밀번호가 틀렸습니다';return}
    authorName=tname;isTeacher=true;
  } else {
    const sid=document.getElementById('msg-author').value;
    if(!sid){errEl.textContent='이름을 선택해주세요';return}
    if(!pw){errEl.textContent='비밀번호를 입력해주세요';return}
    const s=DB.students.find(x=>x.id==sid);
    if(!s||s.pw!==pw){errEl.textContent='비밀번호가 틀렸습니다';return}
    authorName=s.name;
  }
  if(!DB.messages) DB.messages=[];
  const now=new Date();
  const time=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const newMsg={id:'msg'+Date.now(),author:authorName,isTeacher,content,time,replies:[]};
  DB.messages.push(newMsg);
  if(DB.messages.length>50) DB.messages=DB.messages.slice(-50);
  save('message');closeM('modal-msg');renderMsgBoard();
}

function delMsg(id){
  DB.messages=(DB.messages||[]).filter(x=>x.id!==id);

}
function delReply(msgId,repId){
  const m=(DB.messages||[]).find(x=>x.id===msgId);

  m.replies=(m.replies||[]).filter(x=>x.id!==repId);
  save('message');openMsgDetail(msgId);
}

function getStudentClasses(s){
  const reg=[];
  REG_SLOTS.forEach(slot=>{
    const id=s.classes?.[slot.key];
    if(id){const c=DB.regularClasses.find(x=>x.id===id);if(c) reg.push({label:slot.label,name:c.name,teacher:c.teacher,day:c.day||'',timeStart:c.timeStart||'',timeEnd:c.timeEnd||'',type:'reg'});}
  });
  const train=[];
  DB.trainingSlots.forEach(ts=>{
    const id=s.classes?.[ts.slotKey];
    if(id){const o=ts.options.find(x=>x.id===id);if(o) train.push({label:ts.label,name:o.name,teacher:o.teacher,day:o.day||'',timeStart:o.timeStart||'',timeEnd:o.timeEnd||'',type:'train'});}
  });
  // current pickup
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const ph=(s.pickupHistory||[]).find(h=>h.month===ym);
  let pickup=null;
  if(ph&&ph.classId){const c=DB.regularClasses.find(x=>x.id===ph.classId);if(c) pickup={name:c.name,teacher:c.teacher,month:ym};}
  return {reg,train,pickup};
}

function updField(id,field,value){

// ─── WEEKLY CHECKLIST ───
function getWeekLabel(offsetWeeks){
  const now=new Date();
  const day=now.getDay();
  const monday=new Date(now);
  monday.setDate(now.getDate()-((day+6)%7)+offsetWeeks*7);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  return `${monday.getFullYear()}년 ${fmt(monday)}~${fmt(sunday)}`;
}
function getWeekKey(offsetWeeks){
  const now=new Date();const day=now.getDay();
  const monday=new Date(now);
  monday.setDate(now.getDate()-((day+6)%7)+offsetWeeks*7);
  return monday.toISOString().slice(0,10);
}
function renderWeeklyList(s){
  const weeks=s.weeklies||[];
  if(!weeks.length) return `<div class="empty-msg" style="padding:16px;font-size:13px">"이번 주 작성" 버튼으로 체크리스트를 만들어보세요 💪</div>`;
  // show last 4 weeks
  const sorted=[...weeks].sort((a,b)=>b.weekKey.localeCompare(a.weekKey)).slice(0,4);
  return sorted.map((w,wi)=>{
    const isThisWeek=wi===0;
    const done=w.items.filter(i=>i.checked).length;
    const total=w.items.length;
    const pct=total?Math.round(done/total*100):0;
    return `<div style="border-bottom:1px solid var(--border);padding:11px 14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <div style="font-size:12px;font-weight:800;color:${isThisWeek?'var(--pink)':'var(--gray)'}">${isThisWeek?'📍 이번 주':'지난 주'} · ${w.weekLabel}</div>
          <div style="font-size:11px;color:var(--gray);margin-top:1px">${done}/${total} 달성 · ${pct}%</div>
        </div>
        <div style="width:36px;height:36px;position:relative">
          <svg viewBox="0 0 36 36" style="transform:rotate(-90deg);width:36px;height:36px">
            <circle cx="18" cy="18" r="15" fill="none" stroke="var(--border)" stroke-width="3"/>
            <circle cx="18" cy="18" r="15" fill="none" stroke="${pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--pink)'}" stroke-width="3"
              stroke-dasharray="${Math.round(pct*0.942)} 94.2" stroke-linecap="round"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--black)">${pct}%</div>
        </div>
      </div>
      ${w.items.map((item,ii)=>`
      <div style="display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--border)" onclick="${isThisWeek?`toggleWeekly(${s.id},'${w.weekKey}',${ii})`:''}">
        <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${item.checked?'var(--green)':'var(--gray2)'};background:${item.checked?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:${isThisWeek?'pointer':'default'}">
          ${item.checked?'<span style="color:white;font-size:11px;font-weight:800">✓</span>':''}
        </div>
        <div style="flex:1;font-size:13px;${item.checked?'text-decoration:line-through;color:var(--gray)':'font-weight:600'}">${esc(item.text)}</div>
        ${item.checked&&item.checkedDate?`<div style="font-size:10px;color:var(--green);flex-shrink:0">${item.checkedDate}</div>`:''}
      </div>`).join('')}
    </div>`;
  }).join('');
}
function openWeeklyModal(sid){
  curSid=sid;
  const s=DB.students.find(x=>x.id===sid);if(!s) return;
  const wk=getWeekKey(0);
  const existing=(s.weeklies||[]).find(w=>w.weekKey===wk);
  document.getElementById('wm-title').textContent=getWeekLabel(0);
  for(let i=0;i<3;i++){
    const inp=document.getElementById('wm-item-'+i);
    inp.value=(existing && existing.items && existing.items[i]) ? existing.items[i].text : '';
  }
  openM('modal-weekly');
}
function saveWeekly(){
  const s=DB.students.find(x=>x.id===curSid);if(!s) return;
  const items=[];
  for(let i=0;i<3;i++){
    const v=document.getElementById('wm-item-'+i).value.trim();
    if(v) items.push({text:v,checked:false,checkedDate:''});
  }
  if(!items.length){alert('최소 1개 이상 입력해주세요');return}
  const wk=getWeekKey(0);const wl=getWeekLabel(0);
  if(!s.weeklies) s.weeklies=[];
  const idx=s.weeklies.findIndex(w=>w.weekKey===wk);
  if(idx>=0) s.weeklies[idx]={weekKey:wk,weekLabel:wl,items};
  else s.weeklies.push({weekKey:wk,weekLabel:wl,items});
  save('student',curSid);closeM('modal-weekly');
  const el=document.getElementById('weekly-list-'+curSid);
  if(el) el.innerHTML=renderWeeklyList(s);
}
function toggleWeekly(sid,wk,ii){
  const s=DB.students.find(x=>x.id===sid);if(!s) return;
  const w=(s.weeklies||[]).find(x=>x.weekKey===wk);if(!w) return;
  const item=w.items[ii];
  item.checked=!item.checked;
  item.checkedDate=item.checked?new Date().toLocaleDateString('ko-KR'):'';
  save('student',sid);
  const el=document.getElementById('weekly-list-'+sid);
  if(el) el.innerHTML=renderWeeklyList(s);
}

function showTimetablePage(){
  const s=DB.students.find(x=>x.id===curSid);if(!s) return;
  document.getElementById('tt-hd').textContent=`${s.name} 시간표`;

function renderTimetable(s){
  const el=document.getElementById('tt-content');
  const entries=[];
  REG_SLOTS.forEach(slot=>{
    const id=s.classes?.[slot.key];if(!id) return;
    const c=DB.regularClasses.find(x=>x.id===id);
    if(c) entries.push({type:'reg',name:c.name,teacher:c.teacher,day:c.day||'',start:c.timeStart||'',end:c.timeEnd||''});
  });
  DB.trainingSlots.forEach(ts=>{
    const id=s.classes?.[ts.slotKey];if(!id) return;
    const o=ts.options.find(x=>x.id===id);
    if(o) entries.push({type:'train',name:o.name,teacher:o.teacher,day:o.day||'',start:o.timeStart||'',end:o.timeEnd||''});
  });
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const ph=(s.pickupHistory||[]).find(h=>h.month===ym);
  if(ph&&ph.classId){const c=DB.regularClasses.find(x=>x.id===ph.classId);if(c) entries.push({type:'pickup',name:c.name,teacher:c.teacher,day:c.day||'',start:c.timeStart||'',end:c.timeEnd||''});}

  if(!entries.length){
    el.innerHTML=`<div class="card"><div class="card-body"><div class="empty-msg">시간 정보가 입력된 수업이 없어요</div></div></div>`;
    return;
  }

  const DAYS=['월','화','수','목','금','토','일'];
  const toMin=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;};

  // 요일별로 그룹화
  const byDay={};
  DAYS.forEach(d=>byDay[d]=[]);
  entries.forEach(e=>{if(e.day&&byDay[e.day]) byDay[e.day].push(e);});
  const activeDays=DAYS.filter(d=>byDay[d].length>0);

  const typeColor={reg:'var(--pink)',train:'var(--blue)',pickup:'var(--teal)'};
  const typeBg={reg:'var(--pink-bg)',train:'var(--blue-bg)',pickup:'var(--teal-bg)'};
  const typeBd={reg:'#fbb6d8',train:'var(--blue-bd)',pickup:'var(--teal-bd)'};
  const typeLabel={reg:'정규',train:'트레이닝',pickup:'픽업'};

  // 총 수업 수, 요일 수 요약
  const totalCnt=entries.length;
  const dayCnt=activeDays.length;

  let html=`
  <!-- 요약 -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
    <div style="background:var(--white);border-radius:12px;border:1px solid var(--border);padding:12px;text-align:center">
      <div style="font-size:20px;font-weight:900;color:var(--pink)">${totalCnt}</div>
      <div style="font-size:11px;color:var(--gray);margin-top:2px">전체 수업</div>
    </div>
    <div style="background:var(--white);border-radius:12px;border:1px solid var(--border);padding:12px;text-align:center">
      <div style="font-size:20px;font-weight:900;color:var(--blue)">${dayCnt}</div>
      <div style="font-size:11px;color:var(--gray);margin-top:2px">등원 요일</div>
    </div>
    <div style="background:var(--white);border-radius:12px;border:1px solid var(--border);padding:12px;text-align:center">
      <div style="font-size:20px;font-weight:900;color:var(--green)">${entries.filter(e=>e.type==='reg').length}</div>
      <div style="font-size:11px;color:var(--gray);margin-top:2px">정규수업</div>
    </div>
  </div>

  <!-- 범례 -->
  <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--pink-bg);border-left:3px solid var(--pink);display:inline-block"></span><span style="font-size:11px;color:var(--gray)">정규수업</span></div>
    <div style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--blue-bg);border-left:3px solid var(--blue);display:inline-block"></span><span style="font-size:11px;color:var(--gray)">트레이닝</span></div>
    <div style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--teal-bg);border-left:3px solid var(--teal);display:inline-block"></span><span style="font-size:11px;color:var(--gray)">픽업수업</span></div>
  </div>

  <!-- 요일별 목록 -->
  ${activeDays.map(day=>{
    const classes=[...byDay[day]].sort((a,b)=>toMin(a.start)-toMin(b.start));
    const dayColor=day==='토'?'var(--blue)':day==='일'?'var(--red)':'var(--black)';
    return `<div class="card" style="margin-bottom:10px">
      <div style="padding:10px 14px;background:var(--light);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <div style="font-size:18px;font-weight:900;color:${dayColor};min-width:28px">${day}</div>
        <div style="font-size:12px;color:var(--gray)">${classes.length}개 수업</div>
      </div>
      ${classes.map(c=>`
      <div style="padding:11px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center">
        <div style="width:4px;align-self:stretch;border-radius:2px;background:${typeColor[c.type]};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700">${esc(c.name)}</div>
          ${c.teacher?`<div style="font-size:12px;color:var(--gray);margin-top:2px">${esc(c.teacher)}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${c.start?`<div style="font-size:13px;font-weight:700;color:${typeColor[c.type]}">${c.start}${c.end?'~'+c.end:''}</div>`:''}
          <div style="font-size:10px;color:var(--gray);margin-top:1px;background:${typeBg[c.type]};border:1px solid ${typeBd[c.type]};border-radius:6px;padding:1px 6px">${typeLabel[c.type]}</div>
        </div>
      </div>`).join('')}
    </div>`;
  }).join('')}

  <!-- 시간 미입력 수업 -->
  ${entries.filter(e=>!e.day).length?`
  <div class="card">
    <div style="padding:10px 14px;background:var(--light);border-bottom:1px solid var(--border)">
      <div style="font-size:13px;font-weight:700;color:var(--gray)">⏰ 시간 미입력 수업</div>
    </div>
    ${entries.filter(e=>!e.day).map(c=>`
    <div style="padding:11px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center">
      <div style="width:4px;align-self:stretch;border-radius:2px;background:${typeColor[c.type]};flex-shrink:0"></div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700">${esc(c.name)}</div>
        ${c.teacher?`<div style="font-size:12px;color:var(--gray)">${esc(c.teacher)}</div>`:''}
      </div>
      <div style="font-size:10px;color:var(--gray);background:${typeBg[c.type]};border:1px solid ${typeBd[c.type]};border-radius:6px;padding:1px 6px">${typeLabel[c.type]}</div>
    </div>`).join('')}
  </div>`:''}
  `;
  el.innerHTML=html;
}

function submitReq(){

function renderSchedule(){
  const year=new Date().getFullYear();
  const ML=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DL=['일','월','화','수','목','금','토'];
  const today=new Date();
  const evMap={};DB.events.forEach(ev=>{evMap[ev.date]=(evMap[ev.date]||[]);evMap[ev.date].push(ev);});
  document.getElementById('year-cal').innerHTML=ML.map((m,mi)=>{
    const fd=new Date(year,mi,1).getDay(),dm=new Date(year,mi+1,0).getDate();
    let cells='';for(let i=0;i<fd;i++) cells+=`<div></div>`;
    for(let d=1;d<=dm;d++){
      const ds=`${year}-${String(mi+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isT=today.getFullYear()===year&&today.getMonth()===mi&&today.getDate()===d;
      const hasE=evMap[ds];const dow=(fd+d-1)%7;
      let cls='day-cell';if(!isT&&!hasE)cls+=dow===0?' sun':dow===6?' sat':'';
      if(isT)cls+=' today-cell';else if(hasE)cls+=' has-event';
      cells+=`<div class="${cls}" title="${hasE?hasE.map(e=>e.name).join(', '):''}">${d}</div>`;
    }
    return `<div class="month-box"><div class="month-title">${m}</div><div class="month-days">${DL.map(d=>`<div class="day-label">${d}</div>`).join('')}${cells}</div></div>`;
  }).join('');
  const sorted=[...DB.events].sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('event-list').innerHTML=sorted.length?sorted.map(ev=>{
    const[y,mo,d]=ev.date.split('-');
    return `<div class="event-item">
      <div style="background:var(--pink-bg);border-radius:8px;padding:5px 9px;text-align:center;flex-shrink:0;min-width:44px">
        <div style="font-size:19px;font-weight:900;color:var(--pink);line-height:1">${parseInt(d)}</div>
        <div style="font-size:10px;color:var(--pink);font-weight:700">${parseInt(mo)}월</div>
      </div>
      <div style="flex:1"><div style="font-size:14px;font-weight:800">${esc(ev.name)}</div>${ev.memo?`<div style="font-size:12px;color:var(--gray);margin-top:2px">${esc(ev.memo)}</div>`:''}</div>
      ${isAdmin?`<div style="display:flex;gap:3px"><button class="edt-btn" onclick="openEditEv('${ev.id}')">수정</button><button class="del-btn" onclick="delEv('${ev.id}')">삭제</button></div>`:''}
    </div>`;
  }).join(''):'<div class="empty-msg">등록된 행사가 없습니다</div>';
  document.getElementById('sch-admin-btn').innerHTML=isAdmin?`<button class="sbtn pink" onclick="openAddEv()">+ 행사 추가</button>`:'';
}

  const oid=DB.trainingSlots[ti].options[oi].id;DB.trainingSlots[ti].options.splice(oi,1);
  DB.students.forEach(s=>{const k=DB.trainingSlots[ti].slotKey;if(s.classes&&s.classes[k]===oid) s.classes[k]=null;});
  save();saveConfig();renderClsBody();
}

// ── Pickup (admin)
let pickupSid=null;
function renderAdmPickup(c){
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  c.innerHTML=`<div style="background:var(--teal-bg);border:1px solid var(--teal-bd);border-radius:12px;padding:11px 13px;margin-bottom:12px;font-size:13px;color:var(--teal);font-weight:700">
    🎯 이달(${ym}) 픽업수업 지정 · 매달 학생별로 수업을 지정해주세요
  </div>
  <div class="adm-section">
    ${!DB.students.length?'<div class="empty-msg">등록된 학생이 없습니다</div>':DB.students.map(s=>{
      const ph=(s.pickupHistory||[]).find(h=>h.month===ym);
      const curCls=ph&&ph.classId?DB.regularClasses.find(x=>x.id===ph.classId):null;
      return `<div class="adm-row">
        <div class="avatar" style="width:34px;height:34px;font-size:14px">${s.photo?`<img src="${s.photo}">`:`${s.name[0]}`}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14px">${esc(s.name)}</div>
          <div style="font-size:12px;color:${curCls?'var(--teal)':'var(--gray)'};margin-top:2px">${curCls?`🎯 ${esc(curCls.name)} · ${esc(curCls.teacher)}`:'미지정'}</div>
        </div>
        <button class="sbtn pink" onclick="openPickupModal(${s.id})">지정</button>
      </div>`;
    }).join('')}
  </div>
  <div class="sec-title" style="margin-top:16px">📚 픽업 이력 전체</div>
  <div class="adm-section">
    ${DB.students.map(s=>{
      const hist=(s.pickupHistory||[]).filter(h=>h.classId).sort((a,b)=>b.month.localeCompare(a.month));
      if(!hist.length) return `<div class="adm-row"><div style="font-weight:700">${esc(s.name)}</div><div class="text-sm text-gray" style="margin-left:auto">이력 없음</div></div>`;
      return hist.slice(0,3).map((h,i)=>{
        const cls=DB.regularClasses.find(x=>x.id===h.classId);
        return `<div class="adm-row">
          ${i===0?`<div style="font-weight:700;min-width:50px">${esc(s.name)}</div>`:`<div style="min-width:50px"></div>`}
          <div style="flex:1;font-size:12px">${h.month} · <span style="font-weight:700">${cls?esc(cls.name):'삭제됨'}</span></div>
        </div>`;
      }).join('');
    }).join('')}
  </div>`;
}
function openPickupModal(sid){
  pickupSid=sid;const s=DB.students.find(x=>x.id===sid);
  document.getElementById('pickup-sname').textContent=s.name;
  document.getElementById('pickup-title').textContent=`${s.name} 픽업수업 지정`;
  const now=new Date();
  document.getElementById('pickup-month').value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const sel=document.getElementById('pickup-cls-sel');
  sel.innerHTML=`<option value="">— 없음 —</option>${DB.regularClasses.map(c=>`<option value="${c.id}">${esc(c.name)} · ${esc(c.teacher)}</option>`).join('')}`;
  const ym=document.getElementById('pickup-month').value;
  const ph=(s.pickupHistory||[]).find(h=>h.month===ym);
  sel.value=ph?ph.classId||'':'';
  openM('modal-pickup');
}
function savePickup(){
  const s=DB.students.find(x=>x.id===pickupSid);if(!s) return;
  const month=document.getElementById('pickup-month').value;
  const classId=document.getElementById('pickup-cls-sel').value||null;
  if(!s.pickupHistory) s.pickupHistory=[];
  const idx=s.pickupHistory.findIndex(h=>h.month===month);
  if(idx>=0) s.pickupHistory[idx].classId=classId;
  else s.pickupHistory.push({month,classId});
  save('student',pickupSid);closeM('modal-pickup');renderAdmContent();renderStudentList();
}

// ── Schedule
function renderAdmSchedule(c){
  const sorted=[...DB.events].sort((a,b)=>a.date.localeCompare(b.date));
  c.innerHTML=`<button class="btn btn-pink" onclick="openAddEv()" style="margin-bottom:10px">+ 행사 추가</button>
  <div class="adm-section">${!sorted.length?'<div class="empty-msg">등록된 행사가 없습니다</div>':sorted.map(ev=>`<div class="adm-row">
    <div style="flex:1;min-width:0"><div class="fw7">${esc(ev.name)}</div><div class="text-sm text-gray">${ev.date}${ev.memo?` · ${esc(ev.memo)}`:''}</div></div>
    <button class="edt-btn" onclick="openEditEv('${ev.id}')" style="margin-right:3px">수정</button>
    <button class="del-btn" onclick="delEvAdm('${ev.id}')">삭제</button>
  </div>`).join('')}</div>`;
}
function delEvAdm(id){if(!confirm('삭제하시겠습니까?')) return;DB.events=DB.events.filter(x=>x.id!==id);save();saveConfig();renderAdmContent();}

// ── Requests
function renderAdmRequests(c){
  DB.requests.forEach(r=>r.read=true);save();updReqBadge();updAlertDot();
  const sorted=[...DB.requests].sort((a,b)=>b.id.localeCompare(a.id));
  const tl={change:'수업변경',question:'질문'};
  c.innerHTML=!sorted.length?'<div class="empty-msg">신청 내역이 없습니다</div>':sorted.map(r=>`
  <div class="req-item">
    <span class="req-tag ${r.type}">${tl[r.type]||r.type}</span>
    <div style="font-weight:800;font-size:14px;margin-bottom:3px">${esc(r.studentName)}</div>
    <div style="font-size:13px;color:var(--gray);line-height:1.5">${esc(r.reason)}</div>
    <div class="text-sm text-gray" style="margin-top:5px">${r.date}</div>
    <button class="del-btn" style="margin-top:7px" onclick="delReq('${r.id}')">삭제</button>
  </div>`).join('');
}
function delReq(id){DB.requests=DB.requests.filter(x=>x.id!==id);save();if(window.fb) window.fb.deleteRequest(id);renderAdmContent();}

// ── Notice
function renderAdmNotice(c){
  const notices=DB.notices||[];
  c.innerHTML=`
  <div class="adm-section" style="margin-bottom:12px">
    <div style="padding:10px 13px;background:var(--pink-bg);border-bottom:1px solid var(--border);font-weight:800;font-size:13px;color:var(--pink)">📢 등록된 공지 ${notices.length}개</div>
    ${!notices.length?'<div class="empty-msg" style="padding:16px">등록된 공지가 없습니다</div>':
    notices.map((n,i)=>`<div class="adm-row">
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:13px">${esc(n.title)}</div>
        <div style="font-size:11px;color:var(--gray);margin-top:1px">${esc((n.content||'').replace(/\n/g,' ').substring(0,30))}…</div>
      </div>
      <button class="edt-btn" onclick="editNotice(${i})" style="margin-right:4px">수정</button>
      <button class="del-btn" onclick="delNotice(${i})">삭제</button>
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="card-head"><div class="card-title" id="notice-form-title">+ 새 공지 추가</div></div>
    <div class="card-body">
      <input type="hidden" id="notice-edit-idx" value="-1">
      <div class="form-row"><label class="form-label">제목</label><input type="text" id="notice-title-inp" placeholder="예: 입시반 규칙, 홀 사용방법"></div>
      <div class="form-row"><label class="form-label">내용</label><textarea id="notice-inp" style="min-height:150px" placeholder="공지 내용을 입력하세요..."></textarea></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-pink" onclick="saveNotice()">저장하기</button>
        <button class="btn btn-gray" onclick="resetNoticeForm()" id="notice-cancel-btn" style="display:none">취소</button>
      </div>
    </div>
  </div>`;
}
function saveNotice(){
  const title=document.getElementById('notice-title-inp').value.trim();
  const content=document.getElementById('notice-inp').value.trim();
  if(!title){alert('제목을 입력해주세요');return}
  if(!DB.notices) DB.notices=[];
  const idx=parseInt(document.getElementById('notice-edit-idx').value);
  if(idx>=0) DB.notices[idx]={title,content};
  else DB.notices.push({title,content});
  save();saveConfig();alert('공지가 저장됐습니다!');renderAdmContent();
}
function editNotice(i){
  const n=(DB.notices||[])[i];if(!n) return;
  document.getElementById('notice-edit-idx').value=i;
  document.getElementById('notice-title-inp').value=n.title;
  document.getElementById('notice-inp').value=n.content||'';
  document.getElementById('notice-form-title').textContent='✏️ 공지 수정';
  document.getElementById('notice-cancel-btn').style.display='block';
}
function delNotice(i){
  if(!confirm('공지를 삭제하시겠습니까?')) return;
  (DB.notices||[]).splice(i,1);save();saveConfig();renderAdmContent();
}
function resetNoticeForm(){
  document.getElementById('notice-edit-idx').value='-1';
  document.getElementById('notice-title-inp').value='';
  document.getElementById('notice-inp').value='';
  document.getElementById('notice-form-title').textContent='+ 새 공지 추가';
  document.getElementById('notice-cancel-btn').style.display='none';
}

// ── Settings
function renderAdmSettings(c){
  c.innerHTML=`<div class="card">
    <div class="card-head"><div class="card-title">🔐 관리자 비밀번호 변경</div></div>
    <div class="card-body">
      <div class="form-row"><label class="form-label">현재 비밀번호</label><input type="password" id="cur-apw"></div>
      <div class="form-row"><label class="form-label">새 비밀번호</label><input type="password" id="new-apw"></div>
      <div class="form-row"><label class="form-label">새 비밀번호 확인</label><input type="password" id="new-apw2"></div>
      <button class="btn btn-pink" onclick="changeAdminPw()">변경하기</button>
    </div>
  </div>
  <div class="card" style="margin-top:10px">
    <div class="card-head"><div class="card-title">📱 앱 설치 방법</div></div>
    <div class="card-body">
      <div style="color:var(--amber);font-weight:800;font-size:13px;margin-bottom:7px">홈 화면 추가 → 앱처럼 사용!</div>
      <div class="text-sm text-gray">🍎 iPhone: Safari → 공유(□↑) → 홈 화면에 추가</div>
      <div class="text-sm text-gray" style="margin-top:5px">🤖 Android: Chrome → 메뉴(⋮) → 홈 화면에 추가</div>
    </div>
  </div>`;
}
function changeAdminPw(){
  const cur=document.getElementById('cur-apw').value,nw=document.getElementById('new-apw').value,nw2=document.getElementById('new-apw2').value;
  if(cur!==DB.adminPw){alert('현재 비밀번호가 틀렸습니다');return}
  if(!nw||nw!==nw2){alert('새 비밀번호를 확인해주세요');return}
  DB.adminPw=nw;save();saveConfig();alert('비밀번호 변경 완료!');
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function openM(id){document.getElementById(id).classList.add('active');}
function closeM(id){document.getElementById(id).classList.remove('active');}
function handleProfileImg(inp){const f=inp.files[0];if(!f) return;const r=new FileReader();r.onload=e=>{const s=DB.students.find(x=>x.id===curSid);if(!s) return;s.photo=e.target.result;save('student',s.id);renderProfile(s);renderStudentList();};r.readAsDataURL(f);}
function bigImg(src){const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer';ov.innerHTML=`<img src="${src}" style="max-width:92%;max-height:92%;border-radius:12px">`;ov.onclick=()=>ov.remove();document.body.appendChild(ov);}

// missing CSS for calendar/event-item (needed inline)
const style=document.createElement('style');
style.textContent=`
.month-box{background:var(--white);border-radius:11px;border:1px solid var(--border);overflow:hidden}
.month-title{background:var(--pink);color:var(--white);text-align:center;padding:6px;font-size:12px;font-weight:800}
.month-days{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
.day-label{font-size:9px;color:var(--gray);padding:3px 0;font-weight:700}
.day-label:first-child{color:var(--red)}.day-label:last-child{color:var(--blue)}
.day-cell{font-size:10px;padding:2px 1px;line-height:1.7}
.day-cell.sun{color:var(--red)}.day-cell.sat{color:var(--blue)}
.day-cell.has-event{background:var(--pink);color:var(--white);font-weight:800;border-radius:50%;width:19px;height:19px;line-height:19px;padding:0;margin:2px auto;display:flex;align-items:center;justify-content:center}
.day-cell.today-cell{background:var(--black);color:var(--white);font-weight:800;border-radius:50%;width:19px;height:19px;padding:0;margin:2px auto;display:flex;align-items:center;justify-content:center}
.event-item{background:var(--white);border-radius:11px;border:1px solid var(--border);padding:11px 13px;margin-bottom:7px;display:flex;gap:11px;align-items:flex-start}
.divider{height:1px;background:var(--border);margin:11px 0}
`;
document.head.appendChild(style);

// Init
renderMain();
</script>
